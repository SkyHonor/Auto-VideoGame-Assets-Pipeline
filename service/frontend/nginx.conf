server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS server. Using a resolver + a variable in proxy_pass
    # forces nginx to re-resolve the backend hostname on every request instead
    # of caching the IP once at startup. Without this, recreating the backend
    # container (new IP) leaves nginx pointing at a stale address -> 502 Bad
    # Gateway until the frontend is restarted.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy API calls to the FastAPI backend (same-origin -> no CORS needed).
    location /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
