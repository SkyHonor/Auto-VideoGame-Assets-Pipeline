# AssetForge — on-premise game-asset generation stack.
#
# Quick start (works out of the box in mock mode, no GPU required):
#   cp .env.example .env
#   docker compose up --build
#   UI:        http://localhost:5173
#   API docs:  http://localhost:8000/docs
#   MinIO UI:  http://localhost:9001  (minioadmin / minioadmin)
#
# Scale the GPU worker pool horizontally:
#   docker compose up --scale worker=4
#
# Enable real GPU inference (ComfyUI + Ollama) and model download:
#   docker compose --profile gpu --profile models up --build
#   (and set COMFYUI_MOCK=false in .env)

name: assetforge

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      mongo: {condition: service_healthy}
      minio: {condition: service_healthy}
      redis: {condition: service_healthy}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Horizontally scalable generation worker pool: `docker compose up --scale worker=N`
  worker:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info --concurrency=1
    depends_on:
      mongo: {condition: service_healthy}
      minio: {condition: service_healthy}
      redis: {condition: service_healthy}

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  # ---- Optional GPU inference (profile: gpu) ----
  comfyui:
    image: yanwk/comfyui-boot:latest
    profiles: ["gpu"]
    restart: unless-stopped
    ports:
      - "8188:8188"
    volumes:
      - ./models/checkpoints:/root/ComfyUI/models/checkpoints
      - ./models/lora-store:/root/ComfyUI/models/loras
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama:
    image: ollama/ollama:latest
    profiles: ["gpu"]
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # ---- One-shot base-model provisioning from HuggingFace (profile: models) ----
  model-init:
    build: ./models/base-downloader
    profiles: ["models"]
    env_file: .env
    volumes:
      - ./models/checkpoints:/models/checkpoints

  lora-init:
    build: ./models/lora-downloader
    profiles: ["models"]
    env_file: .env
    volumes:
      - ./models/lora-store:/models/loras

volumes:
  mongo_data:
  minio_data:
  ollama_data:
