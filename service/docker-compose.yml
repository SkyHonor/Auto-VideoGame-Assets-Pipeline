# AssetForge — on-premise game-asset generation stack (GPU-only).
#
# Requirements: NVIDIA GPU + NVIDIA Container Toolkit + free disk space (~30 GB
# for images and model weights). No other host configuration is needed.
#
# Single-command deployment (pulls models & LLM automatically on first run):
#   cp .env.example .env
#   docker compose up --build -d
#
#   UI:        http://localhost:5173
#   API docs:  http://localhost:8000/docs
#   ComfyUI:   http://localhost:8188
#   MinIO UI:  http://localhost:9001  (minioadmin / minioadmin)
#
# Scale the GPU generation worker pool horizontally:
#   docker compose up -d --scale worker=4
#
# Provenance of every component is documented in README.md (§ "Из чего собран
# стек"): ComfyUI is built from the official upstream GitHub repository, Ollama
# and the datastores use official images pinned to explicit versions.

name: assetforge

services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- One-shot model provisioning from HuggingFace (public SkyHonor/* repos) ----
  # These run to completion on `up` and populate the shared model volumes before
  # ComfyUI starts. Idempotent: already-present files are skipped on re-runs.
  model-init:
    build: ./models/base-downloader
    env_file: .env
    restart: "no"
    volumes:
      - ./models/checkpoints:/models/checkpoints

  lora-init:
    build: ./models/lora-downloader
    env_file: .env
    restart: "no"
    volumes:
      - ./models/lora-store:/models/loras

  # ---- GPU inference: ComfyUI built from the OFFICIAL upstream repository ----
  comfyui:
    build: ./comfyui
    restart: unless-stopped
    ports:
      - "8188:8188"
    volumes:
      - ./models/checkpoints:/opt/ComfyUI/models/checkpoints
      - ./models/lora-store:/opt/ComfyUI/models/loras
    depends_on:
      model-init: {condition: service_completed_successfully}
      lora-init: {condition: service_completed_successfully}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ---- Local LLM for prompt expansion: official Ollama image + auto model pull ----
  ollama:
    image: ollama/ollama:0.3.14
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama-init:
    image: curlimages/curl:8.10.1
    restart: "no"
    env_file: .env
    depends_on:
      - ollama
    volumes:
      - ./ollama/pull-model.sh:/pull-model.sh:ro
    entrypoint: ["sh", "/pull-model.sh"]

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      mongo: {condition: service_healthy}
      minio: {condition: service_healthy}
      redis: {condition: service_healthy}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Horizontally scalable GPU generation worker pool: `--scale worker=N`
  worker:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info --concurrency=1
    depends_on:
      mongo: {condition: service_healthy}
      minio: {condition: service_healthy}
      redis: {condition: service_healthy}
      comfyui: {condition: service_started}

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mongo_data:
  minio_data:
  ollama_data:
